    en: "Recorded at Sol de Sants Studios, Barcelona, by Alberto Pérez. Mixed and mastered by Yves Roussel."
    es: "Grabación en Sol de Sants Studios, Barcelona, por Alberto Pérez. Mezcla y master por Yves Roussel."
