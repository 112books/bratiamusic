  description:
    ca: "La miríada musical dels Balcans i l’energia i elegància del jazz gitano, reunides pel nomadisme de la música romaní, creen una experiència sonora extraordinària."
    en: "The musical myriad of the Balkans and the energy and elegance of gypsy jazz, brought together by the nomadism of Roma music, create an extraordinary sonic experience."
    es: "La miríada musical de los Balcanes y la energía y elegancia del jazz gitano, reunidas por el nomadismo de la música romaní, crean una experiencia sonora extraordinaria."
  text:
    ca: "Quan un xiuxiueig del passat ens mostra qui som. “Susurro Čoček” és el primer single del disc."
    en: "When a whisper from the past shows us who we are. “Susurro Čoček” is the first single from the album."
    es: "Cuando un susurro del pasado nos muestra quiénes somos. “Susurro Čoček” es el primer single del álbum."
