#   url  = "http://brokenglassesdesign.com/"

[[params.socials]]
  name = "Instagram"
  icon = "instagram"
  url  = "https://www.instagram.com/bratiamusic/"

[[params.socials]]
  name = "Facebook"
  icon = "facebook"
  url  = "https://www.facebook.com/bratiamusic/"

[[params.socials]]
  name = "YouTube"
  icon = "youtube"
  url  = "https://www.youtube.com/@bratiamusic"

[params.analytics]
goatcounter = "bratia-music"
enabled     = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[mediaTypes]
  [mediaTypes."text/calendar"]
    suffixes = ["ics"]

[outputFormats]
  [outputFormats.Calendar]
    mediaType = "text/calendar"
    isPlainText = true
