[params]
description = "Web oficial de Bratia Music – Balkan, Gypsy Jazz i World Music des de Barcelona."
tagline     = "Balkan · Gypsy Jazz · World Music"
og_image    = "images/home-banner.jpg"

promo_enabled = false
promo_text    = "Nou single disponible!"
promo_url     = "https://open.spotify.com"
promo_cta     = "Escolta'l"

google_calendar_ical = "https://calendar.google.com/calendar/ical/7713a217c6e9631a76ac934719903101dbbc9550c23cfb6dc082c9114d8bf981%40group.calendar.google.com/public/basic.ics"

# [[params.sponsors]]
