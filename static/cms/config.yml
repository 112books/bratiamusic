backend:
  name: github
  repo: 112books/bratiamusic
  branch: main
  base_url: https://cms-oauth-bratia-y855.vercel.app
  auth_endpoint: /api/auth


# Mode editorial: draft → review → ready → publish
publish_mode: editorial_workflow

# Imatges pujades des del CMS
media_folder: "static/images/uploads"
public_folder: "/images/uploads"

# Interfície del CMS en català
locale: "ca"

# Configuració multilingüe
i18n:
  structure: multiple_folders
  locales: [ca, es, en]
  default_locale: ca

# Site URL per a previsualització
site_url: https://bratiamusic.com
display_url: https://bratiamusic.com

collections:
  # ─── Pàgines (single_file — sense i18n automàtic) ─
  - name: "pages-ca"
    label: "Pàgines (CA)"
    files:
      - name: "home-ca"
        label: "Portada"
        file: "content/ca/_index.md"
        fields:
          - { label: "Títol", name: "title", widget: "string" }
          - { label: "Descripció SEO", name: "description", widget: "text", required: false }
          - { label: "Contingut", name: "body", widget: "markdown" }
      - name: "about-ca"
        label: "Sobre nosaltres"
        file: "content/ca/sobre/_index.md"
        fields:
          - { label: "Títol", name: "title", widget: "string" }
          - { label: "Descripció SEO", name: "description", widget: "text", required: false }
          - { label: "Contingut", name: "body", widget: "markdown" }

  - name: "pages-es"
    label: "Pàgines (ES)"
    files:
      - name: "home-es"
        label: "Portada"
        file: "content/es/_index.md"
        fields:
          - { label: "Título", name: "title", widget: "string" }
          - { label: "Descripción SEO", name: "description", widget: "text", required: false }
          - { label: "Contenido", name: "body", widget: "markdown" }
      - name: "about-es"
        label: "Sobre nosotros"
        file: "content/es/sobre/_index.md"
        fields:
          - { label: "Título", name: "title", widget: "string" }
          - { label: "Descripción SEO", name: "description", widget: "text", required: false }
          - { label: "Contenido", name: "body", widget: "markdown" }

  - name: "pages-en"
    label: "Pages (EN)"
    files:
      - name: "home-en"
        label: "Home"
        file: "content/en/_index.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "SEO Description", name: "description", widget: "text", required: false }
          - { label: "Content", name: "body", widget: "markdown" }
      - name: "about-en"
        label: "About us"
        file: "content/en/sobre/_index.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "SEO Description", name: "description", widget: "text", required: false }
          - { label: "Content", name: "body", widget: "markdown" }

  # ─── Concerts ─────────────────────────────────────
  - name: "concerts"
    label: "Concerts"
    label_singular: "Concert"
    folder: "content/ca/concerts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    i18n: true
    sortable_fields: ["date", "title"]
    summary: "{{date}} — {{title}} ({{city}})"
    fields:
      - { label: "Títol", name: "title", widget: "string", i18n: true }
      - { label: "Data", name: "date", widget: "datetime", format: "YYYY-MM-DD", time_format: "HH:mm" }
      - { label: "Lloc", name: "venue", widget: "string", i18n: true }
      - { label: "Ciutat", name: "city", widget: "string" }
      - { label: "Adreça", name: "address", widget: "string", required: false }
      - { label: "Entrades (URL)", name: "tickets_url", widget: "string", required: false }
      - { label: "Descripció", name: "body", widget: "markdown", i18n: true, required: false }

  # ─── Discografia ──────────────────────────────────
  - name: "discografia"
    label: "Discografia"
    label_singular: "Disc"
    folder: "content/ca/discografia"
    create: true
    slug: "{{slug}}"
    i18n: true
    sortable_fields: ["year", "title"]
    summary: "{{year}} — {{title}}"
    fields:
      - { label: "Títol", name: "title", widget: "string", i18n: true }
      - { label: "Any", name: "year", widget: "number", value_type: "int" }
      - { label: "Portada", name: "image", widget: "image", required: false }
      - { label: "Spotify URL", name: "spotify_url", widget: "string", required: false }
      - { label: "Bandcamp URL", name: "bandcamp_url", widget: "string", required: false }
      - { label: "Descripció", name: "body", widget: "markdown", i18n: true, required: false }

  # ─── Galeries ─────────────────────────────────────
  - name: "galleries"
    label: "Galeries"
    label_singular: "Galeria"
    folder: "content/ca/galleries"
    create: true
    slug: "{{slug}}"
    i18n: true
    fields:
      - { label: "Títol", name: "title", widget: "string", i18n: true }
      - { label: "Data", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "Imatge destacada", name: "featured_image", widget: "image", required: false }
      - label: "Fotos"
        name: "photos"
        widget: "list"
        fields:
          - { label: "Imatge", name: "src", widget: "image" }
          - { label: "Peu de foto", name: "caption", widget: "string", required: false, i18n: true }
      - { label: "Descripció", name: "body", widget: "markdown", i18n: true, required: false }