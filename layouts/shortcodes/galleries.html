<div class="galleries-grid">
  {{- range .Site.Data.galleries -}}
  <a class="gallery-card" href="#gallery-{{ .id }}" data-open-gallery="{{ .id }}">
    <div class="gallery-card__thumb">
      <img src="{{ .cover | relURL }}"
           onerror="this.src='{{ "images/home-banner.jpg" | relURL }}'"
           alt="{{ .title }}" loading="lazy">
    </div>
    <div class="gallery-card__info">
      <h3 class="gallery-card__title">{{ .title }}</h3>
      <p class="gallery-card__date">{{ .date }}</p>
      <p class="gallery-card__count">{{ len .photos }} fotos</p>
    </div>
  </a>
  {{- end -}}
</div>

{{/* Galeries ocultes (s'obren en clic) */}}
{{- range .Site.Data.galleries -}}
<div class="gallery-section" id="gallery-{{ .id }}" hidden>
  <div class="gallery-section__header">
    <h3>{{ .title }}</h3>
    <button class="gallery-section__close" aria-label="Tancar galeria">← Tornar</button>
  </div>
  <div class="gallery" data-gallery="{{ .id }}">
    {{- range $i, $photo := .photos -}}
    <button class="gallery__item"
            data-src="{{ $photo.file | relURL }}"
            data-cap="{{ $photo.caption }}"
            data-index="{{ $i }}"
            aria-label="{{ $photo.caption | default (printf "foto %d" (add $i 1)) }}">
      <img src="{{ $photo.file | relURL }}" alt="{{ $photo.caption }}" loading="lazy">
      {{- if $photo.caption -}}<span class="gallery__cap">{{ $photo.caption }}</span>{{- end -}}
    </button>
    {{- end -}}
  </div>
</div>
{{- end -}}
