{{ $raw := .Get 0 }}
<p>DEBUG: Shortcode rep: "{{$raw}}"</p>

{{ if eq $raw "balkan-pompe-ignition" }}
  <div style="border: 1px solid green; padding: 20px;">
    <h3>✅ Balkan Pompe Ignition</h3>
    <p>La miríada musical dels Balcans...</p>
  </div>
{{ else if eq $raw "susurro-cocek" }}
  <div style="border: 1px solid blue; padding: 20px;">
    <h3>✅ Susurro Čoček</h3>
    <p>Primer single del disc.</p>
  </div>
{{ else }}
  <div style="color: red; padding: 20px;">
    ❌ ID rebut: "{{$raw}}"
  </div>
{{ end }}
