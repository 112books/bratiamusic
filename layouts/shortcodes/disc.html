{{ $id := .Get "id" }}
{{ $disc := index site.Data.discs $id }}

<div class="disc">

  <div class="disc-cover">
    <img src="/images/discs/{{ $disc.cover }}" alt="{{ $disc.title }}">
  </div>

  <div class="disc-content">
    <h2>{{ $disc.title }}</h2>

    <p>{{ $disc.description }}</p>
    <p>{{ $disc.text }}</p>

    <p class="credits">{{ $disc.credits }}</p>

    <div class="music-links">
      <a href="{{ $disc.url }}" target="_blank">{{ partial "icons/spotify.html" }}</a>
      <a href="{{ $disc.url }}" target="_blank">{{ partial "icons/apple.html" }}</a>
      <a href="{{ $disc.url }}" target="_blank">{{ partial "icons/youtube.html" }}</a>
      <a href="{{ $disc.url }}" target="_blank">{{ partial "icons/deezer.html" }}</a>
    </div>
  </div>

</div>
