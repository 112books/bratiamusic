{{ $id := .Get 0 }}
{{ $disc := index $.Site.Data.disc $id }}

<div class="disc">
  <div class="disc-cover">
    <img src="/images/discs/{{ $disc.cover }}" alt="{{ index $disc.title $.Language.Lang }}">
  </div>
  <div class="disc-content">
    <h2>{{ index $disc.title $.Language.Lang }}</h2>
    <p>{{ index $disc.description $.Language.Lang | markdownify }}</p>
    <p>{{ index $disc.text $.Language.Lang | markdownify }}</p>
    {{ with index $disc.credits $.Language.Lang }}
      <p class="credits">{{ . }}</p>
    {{ end }}
    <!-- urls... -->
  </div>
</div>
