<nav>
{{ range .Site.Menus.main }}
  <a href="{{ .URL | absLangURL }}">{{ .Name }}</a>
{{ end }}
{{ if .Site.Language.Lang | eq "es" }}
  {{ range .Site.Menus.main_es }}
    <a href="{{ .URL | absLangURL }}">{{ .Name }}</a>
  {{ end }}
{{ else if .Site.Language.Lang | eq "en" }}
  {{ range .Site.Menus.main_en }}
    <a href="{{ .URL | absLangURL }}">{{ .Name }}</a>
  {{ end }}
{{ end }}
</nav>
