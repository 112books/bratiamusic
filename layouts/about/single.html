{{ define "main" }}
<div class="about-split">

  <div class="about-split__image">
    <picture>
      <source srcset="{{ "images/bratia-about.webp" | relURL }}" type="image/webp">
      <img src="{{ "images/bratia-about-1200.jpg" | relURL }}" alt="{{ .Site.Title }}" width="1200" height="800" loading="lazy">
    </picture>
  </div>

  <div class="about-split__content">
    <h1 class="page-title">{{ .Title }}</h1>
    <div class="prose">{{ .Content }}</div>
  </div>

</div>
{{ end }}
