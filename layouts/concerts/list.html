{{ define "main" }}
<section class="concerts-section"
  data-ical="{{ "data/concerts.txt" | absURL }}"
  data-lang="{{ .Lang }}"
  data-newsletter="/{{ .Lang }}/newsletter/">

  <div class="section-header">
    <h1 class="section-title">{{ .Title }}</h1>
  </div>

  <div class="concerts-top">

    <div class="cal-wrapper">
      <div class="cal-nav">
        <button class="cal-prev" aria-label="Mes anterior">&#8592;</button>
        <h2 class="cal-month-label"></h2>
        <button class="cal-next" aria-label="Mes següent">&#8594;</button>
      </div>
      <div class="cal-grid-header">
        {{ if eq .Lang "ca" }}
          <span>Dl</span><span>Dt</span><span>Dc</span><span>Dj</span><span>Dv</span><span>Ds</span><span>Dg</span>
        {{ else if eq .Lang "es" }}
          <span>Lu</span><span>Ma</span><span>Mi</span><span>Ju</span><span>Vi</span><span>Sá</span><span>Do</span>
        {{ else }}
          <span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span><span>Su</span>
        {{ end }}
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>

    <div class="concerts-list-col">
      <ul class="concerts-upcoming-list" id="concerts-upcoming">
        <li class="concerts-loading">
          <span class="music-notes">
            <span>♩</span><span>♪</span><span>♫</span><span>♬</span><span>♪</span>
          </span>
        </li>
      </ul>
    </div>

  </div>

  <div class="concert-detail" id="concert-detail" hidden></div>

  <div class="concerts-past-section">
    <h3 class="concerts-past-title">
      {{ if eq .Lang "ca" }}Concerts passats
      {{ else if eq .Lang "es" }}Conciertos pasados
      {{ else }}Past concerts
      {{ end }}
    </h3>
    <ul class="concerts-past-list" id="concerts-past"></ul>
  </div>

</section>

<script src="{{ "js/concerts.js" | relURL }}"></script>
{{ end }}
