{{ define "main" }}
{{ if eq .Section "band" }}
  <!-- Els teus músics originals -->
  <section class="band">
    {{ range where site.Data.band "leader" true }}
      {{ partial "band-member.html" . }}
    {{ end }}
  </section>
{{ else }}
  <!-- Totes les altres llistes (discografia, etc.) -->
  <article>
    <h1>{{ .Title }}</h1>
    {{ .Content }}
  </article>
{{ end }}
{{ end }}
