{{ define "main" }}

<div class="hero">
  <img src="{{ "images/home-banner.jpg" | relURL }}" alt="" class="hero-img" loading="eager" aria-hidden="true">
  <div class="hero-overlay">
    <div class="hero-content">
      <p class="hero-eyebrow">Balkan · Gypsy Jazz · World Music</p>
      <h1 class="hero-title">{{ .Site.Title }}</h1>
      <a href="{{ .Site.Language.Lang | relURL }}/about/" class="hero-cta">
        {{ i18n "discover" | default "Descobrir" }}
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </a>
    </div>
  </div>
</div>

<nav class="section-nav" aria-label="{{ i18n "sections" | default "Seccions" }}">
  <div class="section-nav__inner">
    <a class="section-nav__item" href="{{ .Site.Language.Lang | relURL }}/about/">
      <span class="section-nav__label">{{ i18n "about" }}</span>
    </a>
    <a class="section-nav__item" href="{{ .Site.Language.Lang | relURL }}/the-band/">
      <span class="section-nav__label">{{ i18n "the-band" }}</span>
    </a>
    <a class="section-nav__item" href="{{ .Site.Language.Lang | relURL }}/discography/">
      <span class="section-nav__label">{{ i18n "discography" }}</span>
    </a>
    <a class="section-nav__item" href="{{ .Site.Language.Lang | relURL }}/next-shows/">
      <span class="section-nav__label">{{ i18n "next-shows" }}</span>
    </a>
    <a class="section-nav__item" href="{{ .Site.Language.Lang | relURL }}/videos/">
      <span class="section-nav__label">{{ i18n "videos" }}</span>
    </a>
    <a class="section-nav__item" href="{{ .Site.Language.Lang | relURL }}/photos/">
      <span class="section-nav__label">{{ i18n "photos" }}</span>
    </a>
    <a class="section-nav__item" href="{{ .Site.Language.Lang | relURL }}/contact/">
      <span class="section-nav__label">{{ i18n "contact" }}</span>
    </a>
  </div>
</nav>

{{ end }}
