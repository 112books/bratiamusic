{{ define "main" }}

<div class="page-wrap page-wrap--dark search-wrap">
  <div class="page-inner">

    <h1 class="page-title">{{ .Title }}</h1>

    <div class="search-container">

      {{/* Input de cerca */}}
      <div class="search-input-wrap">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          type="search"
          id="search-input"
          class="search-input"
          placeholder="{{ i18n "search_placeholder" | default "Cerca al web..." }}"
          aria-label="{{ i18n "search_label" | default "Cerca" }}"
          autocomplete="off"
          spellcheck="false"
        >
        <button class="search-clear" id="search-clear" aria-label="{{ i18n "search_clear" | default "Esborrar cerca" }}" hidden>
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      {{/* Estat i resultats */}}
      <div class="search-status" id="search-status" aria-live="polite"></div>
      <div class="search-results" id="search-results" role="list"></div>

    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  const lang = document.documentElement.lang || 'ca';

  const I18N = {
    ca: {
      searching: 'Cercant...',
      results: (n) => n === 1 ? '1 resultat' : `${n} resultats`,
      noResults: (q) => `Cap resultat per a "${q}"`,
      empty: 'Introdueix un terme per cercar.',
      excerpt: 'Extracte',
    },
    es: {
      searching: 'Buscando...',
      results: (n) => n === 1 ? '1 resultado' : `${n} resultados`,
      noResults: (q) => `Sin resultados para "${q}"`,
      empty: 'Introduce un término para buscar.',
      excerpt: 'Extracto',
    },
    en: {
      searching: 'Searching...',
      results: (n) => n === 1 ? '1 result' : `${n} results`,
      noResults: (q) => `No results for "${q}"`,
      empty: 'Enter a term to search.',
      excerpt: 'Excerpt',
    },
  };

  const t = I18N[lang] || I18N.ca;
  const input   = document.getElementById('search-input');
  const status  = document.getElementById('search-status');
  const results = document.getElementById('search-results');
  const clearBtn = document.getElementById('search-clear');

  let pagefind = null;
  let debounceTimer = null;

  // Carrega Pagefind de forma lazy
  async function loadPagefind() {
    if (pagefind) return pagefind;
    try {
      pagefind = await import('{{ "pagefind/pagefind.js" | relURL }}');
      await pagefind.options({ excerptLength: 20 });
      return pagefind;
    } catch(e) {
      console.error('Pagefind no disponible:', e);
      return null;
    }
  }

  // Cerca amb debounce
  function debounce(fn, ms) {
    return function(...args) {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => fn.apply(this, args), ms);
    };
  }

  async function doSearch(query) {
    query = query.trim();

    clearBtn.hidden = !query;

    if (!query) {
      status.textContent = t.empty;
      results.innerHTML = '';
      return;
    }

    status.textContent = t.searching;
    results.innerHTML = '';

    const pf = await loadPagefind();
    if (!pf) {
      status.textContent = 'Error carregant el cercador.';
      return;
    }

    const search = await pf.search(query);
    const data   = await Promise.all(search.results.slice(0, 10).map(r => r.data()));

    if (data.length === 0) {
      status.textContent = t.noResults(query);
      return;
    }

    status.textContent = t.results(data.length);

    results.innerHTML = data.map(r => {
      const image = r.meta?.image
        ? `<img class="search-result__img" src="${r.meta.image}" alt="" loading="lazy">`
        : `<div class="search-result__img search-result__img--placeholder">
             <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
               <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
             </svg>
           </div>`;

      const section = r.meta?.section || '';
      const excerpt = r.excerpt || '';

      return `
        <article class="search-result" role="listitem">
          <a href="${r.url}" class="search-result__link">
            ${image}
            <div class="search-result__body">
              ${section ? `<span class="search-result__section">${section}</span>` : ''}
              <h2 class="search-result__title">${r.meta?.title || r.url}</h2>
              ${excerpt ? `<p class="search-result__excerpt">${excerpt}</p>` : ''}
            </div>
          </a>
        </article>`;
    }).join('');
  }

  const debouncedSearch = debounce(doSearch, 250);

  input.addEventListener('input', () => debouncedSearch(input.value));

  clearBtn.addEventListener('click', () => {
    input.value = '';
    clearBtn.hidden = true;
    status.textContent = t.empty;
    results.innerHTML = '';
    input.focus();
  });

  // Cerca per paràmetre URL (?q=...)
  const params = new URLSearchParams(window.location.search);
  const q = params.get('q');
  if (q) {
    input.value = q;
    doSearch(q);
  } else {
    status.textContent = t.empty;
  }

})();
</script>

{{ end }}
