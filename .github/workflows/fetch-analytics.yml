name: Fetch GoatCounter Analytics

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and process analytics
        env:
          GC_TOKEN: ${{ secrets.GOATCOUNTER_TOKEN }}
          GC_ACCOUNT: bratia-music
        run: |
          BASE="https://${GC_ACCOUNT}.goatcounter.com/api/v0"
          END=$(date +%Y-%m-%d)
          START=$(date -d '30 days ago' +%Y-%m-%d)

          HITS=$(curl -s -H "Authorization: Bearer ${GC_TOKEN}" \
            "${BASE}/stats/hits?start=${START}&end=${END}&limit=100")

          echo "${HITS}" | python3 - << 'PYEOF'
import json, sys, re

data = json.loads(sys.stdin.read())
hits = data.get('hits', [])

sections = ['about', 'the-band', 'music', 'concerts', 'videos', 'photos', 'contact']
langs = ['ca', 'es', 'en']

def normalize(path):
    path = re.sub(r'^/bratiamusic', '', path)
    path = path.strip('/')
    return path

by_section = {s: 0 for s in sections}
by_lang = {l: 0 for l in langs}
total = 0

for h in hits:
    path = normalize(h.get('path', ''))
    count = h.get('count', 0)
    total += count

    parts = path.split('/')
    lang = parts[0] if parts else ''
    section = parts[1] if len(parts) > 1 else ''

    if lang in langs:
        by_lang[lang] += count
    if section in sections:
        by_section[section] += count

result = {
    "generated": "GENERATED",
    "period": {"start": "START", "end": "END"},
    "total": total,
    "by_lang": by_lang,
    "by_section": by_section
}

print(json.dumps(result, indent=2))
PYEOF

      - name: Save analytics JSON
        env:
          GC_TOKEN: ${{ secrets.GOATCOUNTER_TOKEN }}
          GC_ACCOUNT: bratia-music
        run: |
          BASE="https://${GC_ACCOUNT}.goatcounter.com/api/v0"
          END=$(date +%Y-%m-%d)
          START=$(date -d '30 days ago' +%Y-%m-%d)

          HITS=$(curl -s -H "Authorization: Bearer ${GC_TOKEN}" \
            "${BASE}/stats/hits?start=${START}&end=${END}&limit=100")

          echo "${HITS}" | python3 << PYEOF
import json, sys, re
from datetime import datetime, timezone

data = json.loads(sys.stdin.read())
hits = data.get('hits', [])

sections = ['about', 'the-band', 'music', 'concerts', 'videos', 'photos', 'contact']
langs = ['ca', 'es', 'en']

def normalize(path):
    path = re.sub(r'^/bratiamusic', '', path)
    return path.strip('/')

by_section = {s: 0 for s in sections}
by_lang = {l: 0 for l in langs}
total = 0

for h in hits:
    path = normalize(h.get('path', ''))
    count = h.get('count', 0)
    total += count
    parts = [p for p in path.split('/') if p]
    lang = parts[0] if parts else ''
    section = parts[1] if len(parts) > 1 else ''
    if lang in langs:
        by_lang[lang] += count
    if section in sections:
        by_section[section] += count

result = {
    "generated": datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),
    "period": {"start": "${START}", "end": "${END}"},
    "total": total,
    "by_lang": by_lang,
    "by_section": by_section
}

with open('data/analytics.json', 'w') as f:
    json.dump(result, f, indent=2)
print('OK')
PYEOF

      - name: Commit analytics data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/analytics.json
          git diff --staged --quiet || git commit -m "chore: actualitzar analytics [skip ci]"
          git push