name: Fetch GoatCounter Analytics

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch analytics data
        env:
          GC_TOKEN: ${{ secrets.GOATCOUNTER_TOKEN }}
          GC_ACCOUNT: bratia-music
        run: |
          END=$(date +%Y-%m-%d)
          START=$(date -d '30 days ago' +%Y-%m-%d)
          BASE="https://${GC_ACCOUNT}.goatcounter.com/api/v0"
          AUTH="Authorization: Bearer ${GC_TOKEN}"

          HITS=$(curl -s -H "${AUTH}" "${BASE}/stats/hits?start=${START}&end=${END}&limit=100")
          BROWSERS=$(curl -s -H "${AUTH}" "${BASE}/stats/browsers?start=${START}&end=${END}&limit=10")
          SYSTEMS=$(curl -s -H "${AUTH}" "${BASE}/stats/systems?start=${START}&end=${END}&limit=10")
          SIZES=$(curl -s -H "${AUTH}" "${BASE}/stats/sizes?start=${START}&end=${END}&limit=10")
          LOCATIONS=$(curl -s -H "${AUTH}" "${BASE}/stats/locations?start=${START}&end=${END}&limit=10")

          echo "{\"hits_data\":${HITS},\"browsers\":${BROWSERS},\"systems\":${SYSTEMS},\"sizes\":${SIZES},\"locations\":${LOCATIONS}}" > /tmp/raw_all.json

          python3 scripts/process-analytics.py /tmp/raw_all.json static/data/analytics.json "${START}" "${END}"

      - name: Commit analytics data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/data/analytics.json
          git diff --staged --quiet || git commit -m "chore: actualitzar analytics [skip ci]"
          git push
# fetch analytics
