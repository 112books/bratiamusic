name: Fetch GoatCounter Analytics

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch analytics data
        env:
          GC_TOKEN: ${{ secrets.GOATCOUNTER_TOKEN }}
          GC_ACCOUNT: bratia-music
        run: |
          END=$(date +%Y-%m-%d)
          START=$(date -d '30 days ago' +%Y-%m-%d)
          curl -s -H "Authorization: Bearer ${GC_TOKEN}" \
            "https://${GC_ACCOUNT}.goatcounter.com/api/v0/stats/hits?start=${START}&end=${END}&limit=100" \
            > /tmp/raw_hits.json
          python3 scripts/process-analytics.py /tmp/raw_hits.json data/analytics.json "${START}" "${END}"

      - name: Commit analytics data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/analytics.json
          git diff --staged --quiet || git commit -m "chore: actualitzar analytics [skip ci]"
          git push
# fetch analytics
