name: Fetch YouTube videos

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch i processa RSS de YouTube
        run: |
          mkdir -p static/data
          curl -s "https://www.youtube.com/feeds/videos.xml?channel_id=UCXqrXtF9DiXVmfB4X8RX6gA" \
            -o /tmp/yt-feed.xml
          echo "Feed rebut: $(wc -c < /tmp/yt-feed.xml) bytes"
          head -2 /tmp/yt-feed.xml
          python3 scripts/process-youtube.py /tmp/yt-feed.xml static/data/videos.json

      - name: Commit si hi ha canvis
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/data/videos.json
          git diff --staged --quiet || git commit -m "chore: actualitzar videos.json [skip ci]"
          git push